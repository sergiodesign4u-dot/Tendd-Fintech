<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subscription Detail (error) - Tendd Wireframe</title>
<link rel="stylesheet" href="wireframe.css">
</head>
<body>
<div class="layout">
<div id="wftree"></div>
<div class="stage">

<main class="phone" aria-label="Subscription detail error, mobile layout">

  <header class="appbar">
    <a class="back" href="home.html">&lsaquo; Home</a>
    <span class="wordmark">Tendd</span>
    <span class="right">&nbsp;</span>
  </header>

  <div class="screen">

    <section class="zone" aria-label="Could not load">
      <span class="zlabel">Load error - active voice, two ways out</span>
      <div class="msg" role="status" aria-live="polite">
        <h2>We could not load this subscription</h2>
        <p>This is usually temporary. Try again, or go back to your list.</p>
        <div class="act-row" style="justify-content:center">
          <a class="btn primary" href="subscription-detail-loading.html">Try again</a>
          <a class="btn" href="home.html">Back to Home</a>
        </div>
      </div>
      <p class="zaction">Main action: <b>try again</b> or <b>back to Home</b>. Never a stranded error screen.</p>
    </section>

  </div>

  <nav class="tabbar" aria-label="Global navigation">
    <a class="cur" href="home.html" aria-current="page"><span class="ic"></span>Home</a>
    <a href="alerts.html"><span class="ic"></span>Alerts</a>
    <a href="home-savefocus.html"><span class="ic"></span>Save</a>
    <a href="settings.html"><span class="ic"></span>You</a>
  </nav>

</main>

</div><!-- /stage -->
</div><!-- /layout -->
<script src="nav.js"></script>
</body>
</html>
