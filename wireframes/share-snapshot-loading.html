<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Share Snapshot (generating) - Tendd Wireframe</title>
<link rel="stylesheet" href="_wf.css">
</head>
<body>
<div class="layout">
<div id="wftree"></div>
<div class="stage stage-app">

<main class="phone dash" aria-label="Share Snapshot screen, generating state, mobile layout">

  <header class="appbar">
    <span class="wordmark">Tendd</span>
    <a class="back" href="cancel-win.html">Back</a>
  </header>

  <div class="screen">

    <!-- BLOCK 1 (P): Card preview as a calm skeleton -->
    <section class="zone" aria-label="Making your card" aria-busy="true">
      <span class="zlabel">Snapshot card preview - skeleton in the shape of the card</span>
      <div class="callout" style="text-align:center;padding:16px 12px">
        <span class="k">Making your card</span>
        <span class="skel block" style="width:70%;height:12px;margin:6px auto 12px"></span>
        <span class="skel lg block" style="width:60%;margin:0 auto 10px"></span>
        <span class="skel block" style="width:45%;height:12px;margin:0 auto 12px"></span>
        <span class="skel block" style="width:80%;height:12px;margin:0 auto"></span>
      </div>
      <p class="context" style="font-size:12px;color:var(--soft);margin-top:10px">Making your card. This usually takes a moment.</p>
      <p class="zaction">No action needed: this resolves into <b><a href="share-snapshot.html">the ready card</a></b>. If it fails it becomes the <a href="share-snapshot-error.html">share-error</a> state, which keeps a way out.</p>
    </section>

  </div>

  <nav class="tabbar" aria-label="Global navigation">
    <a href="home.html"><span class="ic"></span>Home</a>
    <a href="alerts.html"><span class="ic"></span>Alerts</a>
    <a class="cur" href="home-empty.html" aria-current="page"><span class="ic"></span>Save</a>
    <a href="settings.html"><span class="ic"></span>You</a>
  </nav>

</main>

</div><!-- /stage -->
</div><!-- /layout -->
<script src="_nav.js"></script>
</body>
</html>
