<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Subscription Detail (loading) - Tendd Wireframe</title>
<link rel="stylesheet" href="wireframe.css">
</head>
<body>
<div class="layout">
<div id="wftree"></div>
<div class="stage">

<main class="phone" aria-label="Subscription detail loading, mobile layout">

  <header class="appbar">
    <a class="back" href="home.html">&lsaquo; Home</a>
    <span class="wordmark">Tendd</span>
    <span class="right">&nbsp;</span>
  </header>

  <div class="screen">

    <section class="zone" aria-label="Loading subscription" aria-busy="true">
      <span class="zlabel">Skeleton header, in the shape of the detail</span>
      <div class="detail-head">
        <span class="logo"></span>
        <span style="flex:1">
          <span class="skel block" style="width:50%;height:16px"></span>
          <span class="skel block" style="width:32%;margin-top:8px"></span>
        </span>
      </div>
    </section>

    <section class="zone" aria-label="Loading details" aria-busy="true">
      <span class="zlabel">Skeleton rows</span>
      <span class="skel block" style="width:80%"></span>
      <span class="skel block" style="width:65%;margin-top:8px"></span>
      <span class="skel block" style="width:70%;margin-top:8px"></span>
      <span class="skel block" style="width:55%;margin-top:8px"></span>
      <p class="zaction">No action needed: this resolves into <b><a href="subscription-detail.html">the full detail</a></b>. If it fails, the <a href="subscription-detail-error.html">error state</a> offers a retry and a way back to Home.</p>
    </section>

  </div>

  <nav class="tabbar" aria-label="Global navigation">
    <a class="cur" href="home.html" aria-current="page"><span class="ic"></span>Home</a>
    <a href="alerts.html"><span class="ic"></span>Alerts</a>
    <a href="home-savefocus.html"><span class="ic"></span>Save</a>
    <a href="settings.html"><span class="ic"></span>You</a>
  </nav>

</main>

</div><!-- /stage -->
</div><!-- /layout -->
<script src="nav.js"></script>
</body>
</html>
