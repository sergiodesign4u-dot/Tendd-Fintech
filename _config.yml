# GitHub Pages (Jekyll) configuration.
#
# Jekyll excludes files and folders whose names start with "_" from the built
# site by default. Two phases ship underscore-prefixed shell assets that every
# screen links, so they must be force-included or the pages render with no
# styles: the wireframes (wireframes/_wf.css and wireframes/_nav.js) and the
# Concept color layer (ui-visual/_theme.css). Both the basename and the full
# path are listed so the match holds regardless of how Jekyll walks the tree.
include:
  - "_nav.js"
  - "_wf.css"
  - "_theme.css"
  - "wireframes/_nav.js"
  - "wireframes/_wf.css"
  - "ui-visual/_theme.css"
  - "_screens.js"
  - "ui-visual/_screens.js"
