# GitHub Pages (Jekyll) configuration.
#
# Jekyll excludes files and folders whose names start with "_" from the built
# site by default. The wireframe prototype shares two underscore-prefixed shell
# assets (wireframes/_wf.css and wireframes/_nav.js) that every screen links, so
# they must be force-included or the pages render with no styles and no
# navigation. Both the basename and the full path are listed so the match holds
# regardless of how Jekyll walks the tree.
include:
  - "_nav.js"
  - "_wf.css"
  - "wireframes/_nav.js"
  - "wireframes/_wf.css"
